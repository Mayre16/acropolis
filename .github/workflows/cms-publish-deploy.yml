name: CMS publish — rebuild and deploy

on:
  repository_dispatch:
    types: [cms-publish]
  workflow_dispatch:
    inputs:
      site:
        description: "Sitio (all | acropolis | civis | tienda)"
        required: true
        default: all
        type: choice
        options:
          - all
          - acropolis
          - civis
          - tienda

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.set.outputs.sites }}
    steps:
      - id: set
        run: |
          SITE="${{ github.event.client_payload.site || github.event.inputs.site || 'all' }}"
          case "$SITE" in
            all|both)
              echo 'sites=["acropolis","civis","tienda"]' >> "$GITHUB_OUTPUT"
              ;;
            acropolis|civis|tienda)
              echo "sites=[\"$SITE\"]" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'sites=["acropolis","civis","tienda"]' >> "$GITHUB_OUTPUT"
              ;;
          esac

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.resolve.outputs.sites) }}
    concurrency:
      group: cms-deploy-${{ matrix.site }}
      cancel-in-progress: true
    env:
      CMS_API_URL: ${{ secrets.CMS_API_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync CMS seeds for build (fallback sin API)
        run: |
          mkdir -p editor/data/acropolis editor/data/civis
          if [ -f principal/data/acropolis/published.json ]; then
            cp principal/data/acropolis/published.json editor/data/acropolis/published.json
          fi
          if [ -f civis/data/civis/published.json ]; then
            cp civis/data/civis/published.json editor/data/civis/published.json
          fi

      - name: Build principal (Acropolis)
        if: matrix.site == 'acropolis'
        working-directory: principal
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.PRINCIPAL_SITE_URL || 'https://acropolis.adesa.com.do' }}
          NEXT_PUBLIC_CMS_URL: ${{ secrets.CMS_API_URL || 'https://editor.acropolis.adesa.com.do/api' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PRINCIPAL_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_GSC_VERIFICATION: ${{ secrets.PRINCIPAL_GSC_VERIFICATION }}
        run: npm ci && npm run build:cpanel

      - name: Check principal FTP
        id: principal_ftp
        if: matrix.site == 'acropolis'
        env:
          FTP_SERVER: ${{ secrets.PRINCIPAL_FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then echo "ready=1" >> "$GITHUB_OUTPUT"
          else echo "ready=0" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy principal to cPanel (FTP)
        if: matrix.site == 'acropolis' && steps.principal_ftp.outputs.ready == '1'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.PRINCIPAL_FTP_SERVER }}
          username: ${{ secrets.PRINCIPAL_FTP_USERNAME }}
          password: ${{ secrets.PRINCIPAL_FTP_PASSWORD }}
          local-dir: principal/out/
          server-dir: ${{ secrets.PRINCIPAL_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false

      - name: Build civis
        if: matrix.site == 'civis'
        working-directory: civis
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.CIVIS_SITE_URL || 'https://civis.acropolis.adesa.com.do' }}
          NEXT_PUBLIC_PRINCIPAL_URL: ${{ secrets.PRINCIPAL_SITE_URL || 'https://acropolis.adesa.com.do' }}
          NEXT_PUBLIC_CMS_URL: ${{ secrets.CMS_API_URL || 'https://editor.acropolis.adesa.com.do/api' }}
        run: npm ci && npm run build:cpanel

      - name: Check civis FTP
        id: civis_ftp
        if: matrix.site == 'civis'
        env:
          FTP_SERVER: ${{ secrets.CIVIS_FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then echo "ready=1" >> "$GITHUB_OUTPUT"
          else echo "ready=0" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy civis to cPanel (FTP)
        if: matrix.site == 'civis' && steps.civis_ftp.outputs.ready == '1'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CIVIS_FTP_SERVER }}
          username: ${{ secrets.CIVIS_FTP_USERNAME }}
          password: ${{ secrets.CIVIS_FTP_PASSWORD }}
          local-dir: civis/out/
          server-dir: ${{ secrets.CIVIS_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false

      - name: Build tienda (Editorial)
        if: matrix.site == 'tienda'
        working-directory: tienda
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.TIENDA_SITE_URL || 'https://tienda.acropolis.adesa.com.do' }}
          NEXT_PUBLIC_PRINCIPAL_URL: ${{ secrets.PRINCIPAL_SITE_URL || 'https://acropolis.adesa.com.do' }}
          NEXT_PUBLIC_CIVIS_URL: ${{ secrets.CIVIS_SITE_URL || 'https://civis.acropolis.adesa.com.do' }}
          NEXT_PUBLIC_CMS_URL: ${{ secrets.CMS_API_URL || 'https://editor.acropolis.adesa.com.do/api' }}
          NEXT_PUBLIC_STORE_API_URL: ${{ secrets.STORE_API_URL || 'https://biblioteca-oina.adesa.com.do' }}
        run: npm ci && npm run build:cpanel

      - name: Check tienda FTP
        id: tienda_ftp
        if: matrix.site == 'tienda'
        env:
          FTP_SERVER: ${{ secrets.TIENDA_FTP_SERVER }}
        run: |
          if [ -n "$FTP_SERVER" ]; then echo "ready=1" >> "$GITHUB_OUTPUT"
          else echo "ready=0" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy tienda to cPanel (FTP)
        if: matrix.site == 'tienda' && steps.tienda_ftp.outputs.ready == '1'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.TIENDA_FTP_SERVER }}
          username: ${{ secrets.TIENDA_FTP_USERNAME }}
          password: ${{ secrets.TIENDA_FTP_PASSWORD }}
          local-dir: tienda/out/
          server-dir: ${{ secrets.TIENDA_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false

      - name: Upload build artifact (si FTP no configurado)
        uses: actions/upload-artifact@v4
        with:
          name: cms-${{ matrix.site }}-out
          path: ${{ matrix.site == 'civis' && 'civis/out/' || matrix.site == 'tienda' && 'tienda/out/' || 'principal/out/' }}
          if-no-files-found: ignore
          retention-days: 7
